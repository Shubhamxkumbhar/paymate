spring:
  application:
    name: paymate

  # Add this block ↓
  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: jdbc:postgresql://localhost:5432/paymate
    username: ${DB_USERNAME:paymate_user}
    password: ${DB_PASSWORD:paymate_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

# ── Application metadata ──────────────────────────────────────────
app:
  name: PayMate
  version: 1.0.0

# ── JWT configuration ─────────────────────────────────────────────
# secret: must be at least 32 characters, kept in .env in production
# access-token-expiry: 15 minutes in milliseconds (15 * 60 * 1000)
# refresh-token-expiry: 30 days in milliseconds (30 * 24 * 60 * 60 * 1000)
jwt:
  secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyMinimum32Chars!}
  access-token-expiry: 900000
  refresh-token-expiry: 2592000000