spring:
  application:
    name: paymate

  datasource:
    url: jdbc:postgresql://localhost:5432/paymate
    username: paymate_user
    password: paymate_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080